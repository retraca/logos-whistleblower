version: "3.9"

services:
  sequencer:
    image: lssa/sequencer_service
    ports:
      - "127.0.0.1:3040:3040"
    environment:
      RUST_LOG: info
      RISC0_SERVER_PATH: /usr/local/bin/r0vm
    volumes:
      - sequencer_data:/var/lib/sequencer_service
    healthcheck:
      test:
        - CMD
        - curl
        - -sf
        - http://localhost:3040/
        - -H
        - "Content-Type: application/json"
        - -d
        - '{"jsonrpc":"2.0","method":"hello","params":{},"id":1}'
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Note: replace these image names with the actual Logos Storage and Delivery
  # service images once they are published (see logos-blockchain org on GitHub).
  # The image names below are placeholders -- the services are from the Logos
  # p2p stack and are not yet bundled in the lez-build repo.
  storage:
    image: lssa/logos_storage_service
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      sequencer:
        condition: service_healthy

  delivery:
    image: lssa/logos_delivery_service
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      sequencer:
        condition: service_healthy

volumes:
  sequencer_data:

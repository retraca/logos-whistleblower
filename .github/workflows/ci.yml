name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cargo check
        run: cargo check --workspace

      - name: Unit tests (no chain required)
        run: cargo test --workspace -- --exclude integration

  integration:
    name: Integration tests (sequencer)
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Start sequencer (standalone mode)
        run: |
          docker compose -f docker-compose.yml up -d sequencer
          until curl -sf http://127.0.0.1:3040/ \
            -H 'Content-Type: application/json' \
            -d '{"jsonrpc":"2.0","method":"hello","params":{},"id":1}'; do
            sleep 2
          done

      - name: Start storage + delivery
        run: docker compose -f docker-compose.yml up -d storage delivery

      - name: Integration tests
        env:
          RISC0_DEV_MODE: "0"
        run: cargo test --workspace --test integration -- --include-ignored

      - name: demo.sh smoke test
        env:
          RISC0_DEV_MODE: "0"
        run: bash demo.sh

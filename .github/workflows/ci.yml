name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build + unit/e2e-logic tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # Host-buildable crates (the zkVM guest bin `cid_registry_program` is built
      # separately with the risc0 target — see README; it is not host-compilable).
      - name: Build host crates
        run: cargo build -p document-indexer -p batch-anchor

      # Unit + logic tests: cid-registry registry rules (idempotency, batch>=10,
      # within-batch dedup, query-by-CID) and the indexer broadcast dedup / retry.
      - name: Unit tests
        run: cargo test --workspace --lib

      # Full upload->broadcast->anchor e2e (tests/integration.rs) is #[ignore]'d:
      # it needs a live LEZ sequencer + Logos storage/delivery modules, which are
      # not yet published as CI images. Run locally with `RISC0_DEV_MODE=0 bash demo.sh`.
